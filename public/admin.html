<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meta Bot Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Meta Bot</p>
        <h1>Master admin</h1>
      </div>
      <div class="top-actions">
        <label class="tenant-switcher">
          <span>Klijent</span>
          <select id="tenantSelect"></select>
        </label>
        <span id="saveStatus" class="status-dot">Nesacuvano</span>
        <button id="saveButton" class="primary">Sacuvaj</button>
      </div>
    </header>

    <main class="layout">
      <nav class="tabs" aria-label="Sekcije">
        <button data-tab="dashboard" class="active">1. Dashboard</button>
        <button data-tab="tenants">2. Klijenti</button>
        <button data-tab="business">3. Osnovno</button>
        <button data-tab="channels">4. Kanali</button>
        <button data-tab="automation">5. Automatizacija</button>
        <button data-tab="knowledge">6. Znanje</button>
        <button data-tab="ai">7. AI</button>
        <button data-tab="handoff">8. Handoff</button>
        <button data-tab="privacy">9. Privatnost</button>
        <button data-tab="test">10. Test</button>
      </nav>

      <section class="workspace">
        <section id="tab-dashboard" class="tab-panel active"></section>
        <section id="tab-business" class="tab-panel"></section>
        <section id="tab-tenants" class="tab-panel"></section>
        <section id="tab-channels" class="tab-panel"></section>
        <section id="tab-automation" class="tab-panel"></section>
        <section id="tab-knowledge" class="tab-panel"></section>
        <section id="tab-ai" class="tab-panel"></section>
        <section id="tab-handoff" class="tab-panel"></section>
        <section id="tab-privacy" class="tab-panel"></section>
        <section id="tab-test" class="tab-panel"></section>
      </section>

      <aside class="side">
        <section>
          <h2>Status</h2>
          <dl id="statusList"></dl>
        </section>
        <section>
          <h2>Pregled</h2>
          <div id="conversationList" class="conversation-list"></div>
        </section>
      </aside>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
