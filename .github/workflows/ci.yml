name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Syntax check
        run: find src public -name "*.js" -print0 | xargs -0 -n1 node --check
      - name: Tests
        run: npm test
